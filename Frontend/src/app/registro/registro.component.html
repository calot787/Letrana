<div class="registro-container">

  <h1>Letrana</h1>
  <p class="sub">Regístrate para empezar a comprar</p>

  <form (ngSubmit)="registro()">

    <label for="nombre">Nombre Completo</label>
    <input
      id="nombre"
      type="text"
      [(ngModel)]="nombre"
      name="nombre"
      required
    />

    <label for="email">Email</label>
    <input
      id="email"
      type="email"
      [(ngModel)]="email"
      name="email"
      placeholder="tu@email.com"
      required
    />

    <label for="password">Contraseña</label>
    <input
      id="password"
      type="password"
      [(ngModel)]="password"
      name="password"
      required
    />

    <button type="submit">Crear Cuenta</button>

  </form>

  <p class="login-link">
    ¿Ya tienes cuenta?
    <a routerLink="/login">Inicia sesión</a>
  </p>

</div>
