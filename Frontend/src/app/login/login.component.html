<div class="login-container">

  <h1>Letrana</h1>
  <p class="sub">Accede a tu cuenta de Letrana</p>

  <form (ngSubmit)="login()">

    <label for="email">Email</label>
    <input
      id="email"
      type="email"
      [(ngModel)]="email"
      name="email"
      placeholder="tu@email.com"
      required
    />

    <label for="password">Contraseña</label>
    <input
      id="password"
      type="password"
      [(ngModel)]="password"
      name="password"
      required
    />



    <button type="submit">Iniciar Sesión</button>

  </form>

  <div class="bottom-links">
    ¿No tienes cuenta?
    <a routerLink="/registro">Regístrate</a>
  </div>



</div>
